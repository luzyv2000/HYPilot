name: HYPilot Weekly Code Review

on:
  schedule:
    - cron: "0 3   0"   # Jeden Sonntag um 03:00 UTC
  workflow_dispatch:

jobs:
  codeql:
    name: CodeQL Analyse
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: CodeQL initialisieren
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: CodeQL analysieren
        uses: github/codeql-action/analyze@v3

  lint:
    name: Ruff Linting
    runs-on: ubuntu-latest

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Ruff installieren
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff ausführen
        run: |
          ruff check .

  smoke-tests:
    name: Wöchentliche Smoke-Tests
    runs-on: ubuntu-latest
    needs: [lint]

    env:
      FORCEJAVASCRIPTACTIONSTONODE24: true

    steps:
      - name: Repository auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Smoke-Tests ausführen (Subset)
        run: |
          pytest -m "unit and not slow" -v --tb=short
